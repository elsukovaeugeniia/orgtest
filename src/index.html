<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Credit Card Validator</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="card-validator-container">
    <div class="card-icons">
      <img src="img/visa.svg" alt="Visa" class="card-icon" id="visa" />
      <img src="img/mastercard.svg" alt="MasterCard" class="card-icon" id="mastercard" />
      <img src="img/amex.svg" alt="American Express" class="card-icon" id="amex" />
      <img src="img/discover.svg" alt="Discover" class="card-icon" id="discover" />
      <img src="img/jcb.svg" alt="JCB" class="card-icon" id="jcb" />
      <img src="img/unionpay.svg" alt="UnionPay" class="card-icon" id="unionpay" />
      <img src="img/mir.svg" alt="Mir" class="card-icon" id="mir" />
    </div>
    <div class="input-container">
      <input
        type="text"
        id="cardNumber"
        placeholder="Введите номер карты"
        maxlength="19"
      />
      <button id="validateBtn">Click to Validate</button>
    </div>
    <div id="resultMessage"></div>
  </div>
  <script src="index.js"></script>
</body>
</html>
